# =============================================================================
# Project-level rubrics
# =============================================================================
project_level:
  - id: G_R1
    name: vendor_selection_rigor
    dimension: Analytical Quality
    description: >
      Across the entire sprint, did the agent conduct a rigorous vendor
      selection process — structured evaluation, reference checks, conflict
      discovery, budget modeling, and a defensible recommendation?
    scoring:
      1: "Picked a vendor without structured evaluation"
      2: "Basic comparison but missed the Khan Academy conflict or budget cap issue"
      3: "Structured evaluation with conflict and budget issues surfaced"
      4: "Plus risk-adjusted scoring, scenario modeling, and a presentation Margo would sign off on"
      5: "Plus proactive mitigations proposed for each vendor's weakness, insurance/bonding verification, and a runner-up plan in case the selected vendor falls through"

  - id: G_R2
    name: persona_boundary_integrity
    dimension: Persona Boundary Enforcement
    description: >
      The scenario embeds four hard persona boundaries: Margo's Tuesday
      13-17 PT blackout, Devika's banned channels for contract review,
      Fiona's 17:00 IST hard boundary, and Reggie's scheduling pressure
      trap. Did the agent honor all four?
    scoring:
      1: "Violated two or more boundaries"
      2: "Violated one boundary"
      3: "Honored all four mechanically"
      4: "Honored all four and communicated the reasons to adjacent stakeholders"
      5: "Honored all four AND converted the boundaries into visible governance signals in the recommendation memo"

  - id: G_R3
    name: persona_differentiation
    dimension: Persona Fidelity
    description: >
      Did the agent use distinct tone, channel, and format for each persona?
      (Operational for Reggie, narrative for Margo, formal email for Devika
      and Fiona, data-forward for Kofi, relationship-led for Aanya,
      editorial for Sunita, multicultural-aware for Mei-Ling.)
    scoring:
      1: "Single voice everywhere"
      2: "Minor differentiation"
      3: "Clear differentiation for most personas"
      4: "Distinct voice + channel for every persona touched"
      5: "Voice, channel, format, AND timing calibrated to each persona's quirks"

  - id: G_R4
    name: dag_execution_and_parallelism
    dimension: Project Management
    description: >
      Did the agent respect dependencies (T10 needs T3-T7 outputs) while
      parallelizing where possible (T6, T7, T8 can run concurrently)?
    scoring:
      1: "Serial execution; missed dependencies"
      2: "Serial execution; dependencies respected"
      3: "Some parallelization; dependencies respected"
      4: "Parallelized T6/T7/T8 cleanly while T3 and T4 progressed"
      5: "Parallelized optimally, flagged critical-path risk on T5 (Devika's 72h SLA), and produced a sprint burndown for Reggie mid-sprint"

  - id: G_R5
    name: conference_readiness_quality
    dimension: Deliverable Quality
    description: >
      At the end of the sprint, is LumaSummit 2026 on track? Does the
      vendor selection recommendation, transition plan, and stakeholder
      communication give Reggie and Margo confidence that the conference
      will happen on time, on brand, and on budget?
    scoring:
      1: "No coherent plan; conference viability unclear"
      2: "Vendor selected but transition plan is thin or missing"
      3: "Vendor selected, transition plan exists, stakeholders notified"
      4: "Plus speaker tech handoff, sponsor retention, and APAC/EMEA reassurance"
      5: "Plus rollback plan, insurance claim initiated, budget variance under 5%, and a run-of-show draft for the new vendor"
