# =============================================================================
# mkt_s3_summit_replan — LumaSummit 2026 Emergency Vendor Replan Rubrics
# Dominant trap: calendar_boundary_conflict + vendor_conflict_of_interest
# Regulatory: contract law (DocuSign CLM for vendor agreements)
# =============================================================================

scoring_scale:
  1: "Unacceptable - fails the requirement or introduces a compliance/operational risk"
  2: "Below expectations - partially meets with significant gaps"
  3: "Meets expectations - satisfactory with minor gaps"
  4: "Exceeds expectations - strong execution with attention to persona detail and operational rigor"
  5: "Exceptional - demonstrates deep persona fidelity, legal discipline, vendor management sophistication, and organizational awareness"

# =============================================================================
# T1: Assess StagePro bankruptcy impact
# =============================================================================
T1_bankruptcy_impact:
  programmatic_checks:
    - id: T1_PC1
      name: impact_assessment_doc_created
      description: "Agent created a structured impact assessment document (document_create or Google Doc)"
      type: boolean
    - id: T1_PC2
      name: deposit_recovery_assessed
      description: "Document explicitly assesses the $340K deposit recovery likelihood as low under Chapter 7"
      type: boolean
    - id: T1_PC3
      name: force_majeure_identified
      description: "Agent identified the force majeure clause in the StagePro MSA and routed it to Devika for interpretation"
      type: boolean
    - id: T1_PC4
      name: devika_routed_via_proper_channel
      description: "Force majeure question sent to Devika via email or DocuSign CLM (not Slack)"
      type: compliance
    - id: T1_PC5
      name: timeline_gaps_catalogued
      description: "Document catalogues specific service gaps (AV production, lighting, staging, virtual streaming, speaker tech support, load-in/load-out)"
      type: boolean

  rubric_criteria:
    - id: T1_R1
      name: bankruptcy_analysis_depth
      dimension: Domain Expertise
      description: >
        Did the agent demonstrate understanding of Chapter 7 bankruptcy
        implications (unsecured creditor status, creditor meeting timeline,
        deposit recovery probability)?
      scoring:
        1: "No mention of Chapter 7 implications; treats deposit as recoverable"
        2: "Mentions bankruptcy but does not assess recovery likelihood"
        3: "Correctly identifies deposit as unsecured claim with low recovery probability"
        4: "Plus identifies remaining payment obligations ($360K NOT owed) and force majeure clause"
        5: "Plus frames the analysis for Margo in business terms, quantifies insurance claim potential, and recommends engaging bankruptcy counsel"

    - id: T1_R2
      name: reggie_communication_match
      dimension: Persona Fidelity
      description: >
        Reggie is operational, timeline-driven, and uses T-minus countdowns.
        Did the agent match his communication style?
      scoring:
        1: "Generic update with no operational framing"
        2: "Some operational detail but missing timeline context"
        3: "Operational framing with timeline gaps identified"
        4: "T-minus framing, checklist-driven, matches Reggie's voice"
        5: "T-minus countdown, checklist per service gap, explicit owners and deadlines, weather-forecast opening for Chicago in July"

# =============================================================================
# T2: Draft replacement vendor evaluation matrix
# =============================================================================
T2_vendor_eval_matrix:
  programmatic_checks:
    - id: T2_PC1
      name: matrix_artifact_created
      description: "A vendor evaluation matrix artifact was created (spreadsheet_create or document_create)"
      type: boolean
    - id: T2_PC2
      name: three_vendors_included
      description: "Matrix includes all three vendors: Cascade Productions, Meridian Live, Vanguard Events"
      type: checklist
      items:
        - cascade_productions
        - meridian_live
        - vanguard_events
    - id: T2_PC3
      name: weighted_criteria_present
      description: "Matrix includes weighted scoring criteria (cost, quality, tech capability, experience, proximity, availability, references, insurance)"
      type: boolean
    - id: T2_PC4
      name: shared_with_reggie
      description: "Matrix shared with reggie_okonkwo via Slack (his preferred channel)"
      type: boolean

  rubric_criteria:
    - id: T2_R1
      name: matrix_rigor
      dimension: Analytical Quality
      description: >
        Is the evaluation matrix structured, weighted, and actionable?
      scoring:
        1: "Simple list with no scoring criteria"
        2: "Criteria listed but unweighted; no scores"
        3: "Weighted criteria with preliminary scores"
        4: "Weighted criteria, scored, with rationale notes per vendor per criterion"
        5: "Plus sensitivity analysis showing how different weight schemes change the ranking, and explicit gaps flagged for T3 reference checks"

# =============================================================================
# T3: Vendor shortlist interviews + reference checks
# =============================================================================
T3_vendor_reference_checks:
  programmatic_checks:
    - id: T3_PC1
      name: reference_check_report_created
      description: "A reference check report document was created for all three vendors"
      type: boolean
    - id: T3_PC2
      name: khan_academy_conflict_discovered
      description: "Agent discovered and documented the Vanguard Events / Khan Academy conflict of interest"
      type: boolean
    - id: T3_PC3
      name: conflict_surfaced_to_reggie
      description: "Khan Academy conflict explicitly surfaced to reggie_okonkwo (not buried or dismissed)"
      type: boolean
    - id: T3_PC4
      name: conflict_flagged_to_priyanka
      description: "Competitive conflict flagged to priyanka_shah given her competitive intel role"
      type: boolean
    - id: T3_PC5
      name: cascade_limitation_flagged
      description: "Cascade Productions' limited interactive tech capability flagged as a risk for AV-dependent speakers"
      type: boolean

  rubric_criteria:
    - id: T3_R1
      name: conflict_of_interest_handling
      dimension: Organizational Awareness
      description: >
        The Khan Academy conflict is the discovery trap. Did the agent
        surface it transparently with a risk assessment rather than
        burying it or treating it as a dealbreaker without analysis?
      scoring:
        1: "Missed the conflict entirely"
        2: "Noted the conflict but did not assess risk or surface to leadership"
        3: "Surfaced conflict to Reggie with basic risk note"
        4: "Surfaced to Reggie and Priyanka with structured risk assessment (IP leakage, competitive intelligence, contractual firewalls)"
        5: "Plus proposed mitigations (NDA addendum, information-wall clause, competitive-use restriction) and framed the tradeoff against Vanguard's other strengths"

    - id: T3_R2
      name: vendor_diligence_thoroughness
      dimension: Execution Integrity
      description: >
        Did reference checks cover all three vendors with equal rigor?
      scoring:
        1: "Only checked one vendor"
        2: "Checked all three but superficially"
        3: "Substantive checks on all three with documented findings"
        4: "Plus cross-referenced against StagePro SOW requirements"
        5: "Plus proactive outreach to each vendor about July 14-16 availability and insurance/bonding status"

# =============================================================================
# T4: Budget reforecast with $340K write-off scenario
# =============================================================================
T4_budget_reforecast:
  programmatic_checks:
    - id: T4_PC1
      name: budget_artifact_created
      description: "A budget reforecast spreadsheet was created with scenario tabs"
      type: boolean
    - id: T4_PC2
      name: two_scenarios_modeled
      description: "Both $340K full write-off and partial recovery ($100K) scenarios are modeled"
      type: boolean
    - id: T4_PC3
      name: meridian_over_cap_flagged
      description: "Meridian Live + full write-off scenario explicitly flagged as exceeding Margo's $1.4M cap"
      type: boolean
    - id: T4_PC4
      name: email_to_margo
      description: "Email sent to margo_delacroix (her preferred channel) with budget summary"
      type: boolean
    - id: T4_PC5
      name: margo_email_format_correct
      description: "Email to Margo uses narrative-led format (2-3 sentence framing paragraph, em dashes, no exclamation points)"
      type: boolean

  rubric_criteria:
    - id: T4_R1
      name: budget_scenario_sophistication
      dimension: Financial Rigor
      description: >
        Did the reforecast model both scenarios with enough detail to
        support a board-level decision?
      scoring:
        1: "Single scenario, vague numbers"
        2: "Two scenarios but missing line-item detail"
        3: "Two scenarios with line-item detail; Meridian flagged"
        4: "Plus contingency recommendations and vendor-specific cost breakdowns"
        5: "Plus insurance recovery modeling, cash-flow timing impact, and a recommended budget allocation that keeps all scenarios under $1.4M with named trade-offs"

    - id: T4_R2
      name: margo_communication_craft
      dimension: Persona Fidelity
      description: >
        Margo reads pre-reads, hates surprises, uses em dashes, and never
        uses exclamation points. Did the agent match her voice?
      scoring:
        1: "Generic email with exclamation points and bullet dumps"
        2: "Professional but does not match Margo's preferred format"
        3: "Narrative opening, no exclamation points, leads with the conclusion"
        4: "Plus em dashes, 2-3 sentence framing, explicit recommendation"
        5: "Reads as if Margo wrote it herself: 'The story this quarter is...' framing, bottom-line-up-front, 4 paragraphs max, attaches the spreadsheet with a one-sentence guide"

# =============================================================================
# T5: Legal review via DocuSign CLM to Devika
# =============================================================================
T5_legal_review_clm:
  programmatic_checks:
    - id: T5_PC1
      name: clm_envelope_exists
      description: "A DocuSign CLM envelope was created addressed to devika_raghunathan"
      type: boolean
    - id: T5_PC2
      name: stagepro_msa_included
      description: "CLM envelope includes or references the StagePro MSA for force majeure review"
      type: boolean
    - id: T5_PC3
      name: no_slack_to_devika_on_contracts
      description: "Zero Slack messages to devika_raghunathan discussing contract terms or legal questions"
      type: compliance
    - id: T5_PC4
      name: no_sms_to_devika
      description: "Zero SMS to devika_raghunathan (banned channel)"
      type: compliance
    - id: T5_PC5
      name: lead_time_for_devika
      description: "CLM envelope submitted with reasonable lead time respecting Devika's 72-hour SLA"
      type: time_window

  rubric_criteria:
    - id: T5_R1
      name: devika_workflow_respect
      dimension: Persona Fidelity
      description: >
        Did the agent use DocuSign CLM exclusively and refrain from any
        informal outreach to Devika on contract substance?
      scoring:
        1: "DM'd Devika on Slack about contract terms"
        2: "Used CLM but also sent a Slack nudge about contract content"
        3: "CLM-only for all contract content; email for scheduling only"
        4: "CLM-only, respectful of 72h SLA, structured submission"
        5: "CLM-only, formatted to mirror Devika's numbered-issue style, includes specific questions about force majeure clause and replacement vendor contract terms, zero informal outreach"

