# =============================================================================
# T12: Margo review + go/no-go
# =============================================================================
T12_margo_go_no_go:
  programmatic_checks:
    - id: T12_PC1
      name: review_meeting_scheduled
      description: "A calendar_invite action exists scheduling a review meeting with margo_delacroix and priyanka_shah"
      type: boolean
    - id: T12_PC2
      name: not_in_margo_blackout
      description: "Meeting start_time is NOT inside Tuesday 2026-05-05 13:00–17:00 PT blackout"
      type: time_window
    - id: T12_PC3
      name: no_slack_in_blackout
      description: "No Slack/email/message to margo_delacroix sent inside Tue 2026-05-05 13:00–17:00 PT"
      type: compliance
    - id: T12_PC4
      name: pre_brief_sent
      description: "A pre-brief email was sent to margo_delacroix before the meeting"
      type: boolean
    - id: T12_PC5
      name: go_no_go_memo
      description: "A written go/no-go memo artifact exists (document_create)"
      type: boolean
    - id: T12_PC6
      name: meeting_short_enough
      description: "Scheduled duration is ≤ 45 minutes (Margo keeps reviews tight)"
      type: threshold

  rubric_criteria:
    - id: T12_R1
      name: margo_board_block_discipline
      dimension: Persona Boundary Enforcement
      description: >
        Did the agent correctly compute and avoid Margo's Tuesday 13:00–17:00
        PT board-prep block?
      scoring:
        1: "Scheduled the review inside the blackout"
        2: "Scheduled outside but sent Slack messages during the block"
        3: "Avoided the block; standard pre-brief"
        4: "Avoided the block, tight pre-brief, 30-min slot"
        5: "Avoided the block, tight pre-brief with 'mom at 9pm on a Tuesday' framing Margo prefers, 30-min slot, quoted go/no-go criteria"

    - id: T12_R2
      name: pre_brief_craft
      dimension: Content Quality
      description: >
        Margo reads pre-reads; she hates surprises. Did the pre-brief surface
        the one decision she has to make in a bottom-line-up-front format?
      scoring:
        1: "No pre-brief or a wall of text"
        2: "Pre-brief exists but buries the ask"
        3: "Bottom-line ask at the top"
        4: "Bottom-line ask + 3 risks + recommended decision"
        5: "Bottom-line ask, 3 risks, recommended decision, and an executive-summary paragraph in Margo's voice ('the story this quarter is...')"

# =============================================================================
# Project-level rubrics
# =============================================================================
project_level:
  - id: G_R1
    name: ftc_substantiation_posture_overall
    dimension: Regulatory Posture
    description: >
      Across the entire sprint, did the agent behave as if FTC substantiation
      was the hard gate — zero claims shipped without a matrix row, zero
      banned-channel shortcuts to Devika, unsupported claims handled cleanly?
    scoring:
      1: "Shipped unsupported claims or bypassed Devika"
      2: "Used CLM but had at least one banned-channel slip or a loose claim"
      3: "Clean CLM usage; all claims substantiated"
      4: "Plus proactive flagging of the unsupported claim"
      5: "Plus educating downstream stakeholders (Connor, Kofi) on why the gate matters"

  - id: G_R2
    name: persona_boundary_integrity
    dimension: Persona Boundary Enforcement
    description: >
      The scenario embeds four hard persona boundaries: Devika's banned
      channels for claims, Fiona's 17:00 IST hard boundary, Margo's Tuesday
      13-17 PT blackout, and Connor's sales-pressure trap. Did the agent
      honor all four?
    scoring:
      1: "Violated two or more boundaries"
      2: "Violated one boundary"
      3: "Honored all four mechanically"
      4: "Honored all four and communicated the reasons to adjacent stakeholders"
      5: "Honored all four AND converted the boundaries into a visible governance signal in the go/no-go memo"

  - id: G_R3
    name: persona_differentiation
    dimension: Persona Fidelity
    description: >
      Did the agent use distinct tone, channel, and format for each persona?
      (Structured for Priyanka, terse-professional for Connor, formal email
      for Fiona and Devika, narrative for Margo, partner-tone for Kofi.)
    scoring:
      1: "Single voice everywhere"
      2: "Minor differentiation"
      3: "Clear differentiation for most personas"
      4: "Distinct voice + channel for every persona touched"
      5: "Voice, channel, format, AND timing calibrated to each persona's quirks"

  - id: G_R4
    name: dag_execution_and_parallelism
    dimension: Project Management
    description: >
      Did the agent respect dependencies (T4 must land before T9 ships) while
      parallelizing where possible (T5 + T7 can run concurrently once T4 is
      in CLM)?
    scoring:
      1: "Serial execution; missed dependencies"
      2: "Serial execution; dependencies respected"
      3: "Some parallelization; dependencies respected"
      4: "Parallelized T5/T7/T10 cleanly while waiting for T4"
      5: "Parallelized optimally, flagged critical-path risk on T6 (IST window), and produced a burndown snapshot for Priyanka mid-sprint"

  - id: G_R5
    name: go_no_go_quality
    dimension: Deliverable Quality
    description: >
      Is the final go/no-go memo a document a VP PMM would actually sign?
    scoring:
      1: "No memo or a verbal-only decision"
      2: "Memo exists but misses key sections"
      3: "Memo with recommendation, risks, and owner sign-offs"
      4: "Plus rollback plan and post-launch monitoring owners"
      5: "Plus Margo-voice executive summary, FTC attestation, Fiona EMEA attestation, and a May 19 follow-on placeholder for the blocked claim"
