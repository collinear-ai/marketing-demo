        2: "Gave dates but no rationale"
        3: "Clean ask with new dates and reason"
        4: "Collaborative framing, invites his input on wave sequencing"
        5: "Collaborative, offers tradeoffs, respects his CT hours, and links to the GTM calendar v2"

