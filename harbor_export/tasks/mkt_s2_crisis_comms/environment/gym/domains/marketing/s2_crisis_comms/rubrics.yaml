      name: margo_blackout_discipline
      dimension: Persona Boundary Enforcement
      description: >
        The crisis may tempt the agent to breach Margo's Tuesday board-prep
        block. Did they respect it under pressure?
      scoring:
        1: "Scheduled the briefing inside the blackout"
        2: "Scheduled outside but sent messages during the block"
        3: "Avoided the block cleanly"
        4: "Avoided the block, tight pre-brief, 30-45 min slot"
        5: "Avoided the block, pre-brief in Margo's narrative voice, 30-min slot, and explicitly noted 'I scheduled this outside your Tuesday block' to signal awareness"

    - id: T11_R2
      name: decision_brief_quality
      dimension: Deliverable Quality
      description: >
        The CMO needs to make (or recommend to the CEO) a decision on the
        KnowGraph partnership. Did the brief equip her to do so?
      scoring:
        1: "No decision brief or a one-paragraph summary"
        2: "Brief exists but presents a binary keep/cut without nuance"
        3: "Brief presents 3 options with pros/cons"
        4: "3 options with pros/cons/risks, revenue impact, brand impact, and CEO relationship context"
        5: "3 options, fully dimensioned, written in Margo's 'the story we tell' framing, includes a recommended path, and ends with the one decision she has to make"

