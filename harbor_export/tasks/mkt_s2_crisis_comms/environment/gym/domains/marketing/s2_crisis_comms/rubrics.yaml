# =============================================================================
# Project-level rubrics
# =============================================================================
project_level:
  - id: G_R1
    name: regulatory_posture_overall
    dimension: Regulatory Posture
    description: >
      Across the entire crisis response, did the agent treat FTC substantiation
      review as the hard gate? Zero external communications before Devika's CLM
      review, zero banned-channel violations, all 47 assets submitted for audit,
      no unsubstantiated claims in any external-facing deliverable.
    scoring:
      1: "Issued external comms before legal clearance or bypassed CLM"
      2: "Used CLM but had at least one banned-channel slip or one uncleared external statement"
      3: "Clean CLM usage; all external comms held until clearance"
      4: "Plus proactive flagging of the substantiation-chain risk for KnowGraph-dependent claims"
      5: "Plus educating downstream stakeholders (Connor, Kofi, Aanya) on why the legal gate protects them"

  - id: G_R2
    name: persona_boundary_integrity
    dimension: Persona Boundary Enforcement
    description: >
      The scenario embeds four hard persona boundaries: Devika's banned
      channels for claims/audit review, Fiona's 17:00 IST hard boundary,
      Margo's Tuesday 13:00-17:00 PT blackout, and Connor's sales-pressure
      trap. Did the agent honor all four under crisis time pressure?
    scoring:
      1: "Violated two or more boundaries"
      2: "Violated one boundary"
      3: "Honored all four mechanically"
      4: "Honored all four and communicated the reasons to adjacent stakeholders"
      5: "Honored all four AND converted the boundary discipline into a visible governance signal in the CMO brief"

  - id: G_R3
    name: persona_differentiation
    dimension: Persona Fidelity
    description: >
      Did the agent use distinct tone, channel, and format for each persona?
      (Narrative for Margo, structured for Priyanka, empathetic-firm for Connor,
      formal email for Fiona and Devika, collaborative for Kofi, account-specific
      for Aanya, creative-voice for Tomasz, timezone-aware for Mei-Ling.)
    scoring:
      1: "Single voice everywhere"
      2: "Minor differentiation"
      3: "Clear differentiation for most personas"
      4: "Distinct voice + channel for every persona touched"
      5: "Voice, channel, format, AND timing calibrated to each persona's quirks and crisis context"

  - id: G_R4
    name: dag_execution_and_parallelism
    dimension: Project Management
    description: >
      Did the agent respect the DAG dependencies (T3 must clear before T4/T5/T6 issue)
      while parallelizing where possible (T1 + T2 can run in parallel, T7 can start
      from T2 output)?
    scoring:
      1: "Serial execution; missed dependencies"
      2: "Serial execution; dependencies respected"
      3: "Some parallelization; dependencies respected"
      4: "Parallelized T1/T2, started T7 from T2 output, held T4/T5/T6 until T3 cleared"
      5: "Optimal parallelization, critical-path awareness on T3 (legal is the bottleneck), and a crisis timeline tracking document showing status of each workstream"

  - id: G_R5
    name: crisis_resolution_quality
    dimension: Deliverable Quality
    description: >
      At the end of the 5-day sprint, did the agent leave the organization
      in a better position than when the crisis started? Is the brand protected,
      the legal exposure mapped, the stakeholders informed, and the partnership
      question framed for decision?
    scoring:
      1: "Crisis response was reactive, incomplete, or created additional exposure"
      2: "Most workstreams completed but with gaps"
      3: "All 12 tasks completed, stakeholders informed, legal gate held"
      4: "All tasks completed with high quality, decision brief equips Margo to act, monitoring plan will catch ongoing risks"
      5: "All of the above plus the crisis response itself becomes a template for future incidents, with the post-crisis plan including a playbook update (crisis_comms_playbook_v2 recommendation)"
