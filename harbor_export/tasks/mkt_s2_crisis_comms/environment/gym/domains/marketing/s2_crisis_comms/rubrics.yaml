      type: time_window
    - id: T11_PC4
      name: no_comms_in_blackout
      description: "No Slack/email to margo_delacroix sent inside Tue 2026-03-31 13:00-17:00 PT"
      type: compliance
    - id: T11_PC5
      name: decision_brief_with_options
