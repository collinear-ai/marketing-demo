# =============================================================================
# Marketing Domain Shared Persona Pool — Lumalynx Learning
# =============================================================================
# Lumalynx Learning is a mid-stage edtech company (Series C, $72M raised, 640
# employees) that sells an AI-powered K-12 tutoring platform direct to parents
# ("Lumalynx Home") and to school districts ("Lumalynx Classroom"). HQ is in
# San Francisco with an EMEA hub in Dublin (120 FTE, GDPR + UK-facing) and an
# APAC growth office in Singapore (35 FTE, covering ANZ, India and Southeast
# Asia). Lumalynx is preparing to launch "Lumalynx Tutor 3.0" in May 2026 —
# the first version with a generative-AI-powered adaptive math engine. The
# launch is co-branded with KnowGraph, an education content partner that
# licenses curriculum-aligned problem sets. In late March 2026, investigative
# journalists at The Verge published allegations that KnowGraph's problem
# sets include material scraped from copyrighted textbook publishers without
# license — which has triggered a brand crisis for Lumalynx by association.
# Simultaneously, the annual LumaSummit user conference (1,400 attendees,
# Chicago, scheduled July 14-16) lost its primary AV/production vendor after
# the vendor filed for bankruptcy in mid-March, forcing a full replan. The
# content team is also mid-way through a rebrand from the original "Lumalynx
# Tutor" product name to "Lumalynx Learn" to align with a new umbrella brand
# architecture — a rebrand that requires a 2,400-URL SEO migration. FTC has
# been aggressive about AI efficacy claims in edtech (three consent decrees
# against competitors in the last 18 months), so every outcome claim (e.g.
# "raises math scores 38%") must pass legal review before publication.
# =============================================================================

organization:
  name: Lumalynx Learning
  industry: Consumer + B2B Edtech (K-12 AI Tutoring)
  stage: Series C (post-$72M raise, June 2024)
  revenue: "$94M ARR (60% Home consumer subs, 40% Classroom district contracts)"
  headcount: 640
  hq: San Francisco, CA (Mission Bay)
  additional_sites:
    - Dublin, Ireland (EMEA HQ, 120 FTE — marketing, support, Gaeilge localization)
    - Singapore (APAC growth office, 35 FTE — covering ANZ, India, SEA)
    - Remote US (approx 110 FTE across 28 states)
  fiscal_year_end: December 31
  flagship_launch: "Lumalynx Tutor 3.0 (rebranding to 'Lumalynx Learn') — May 12, 2026"
  annual_conference: "LumaSummit 2026 — Chicago, July 14-16 (1,400 attendees, educators + district buyers + parents)"
  key_partner_under_scrutiny: KnowGraph Education (curriculum content licensing partner, named in The Verge investigation March 27, 2026)
  primary_tools:
    marketing_automation: HubSpot Marketing Hub Enterprise (lead nurture, email, landing pages)
    crm: Salesforce Sales Cloud (shared with Sales org)
    abm: 6sense (intent data, account scoring) + Demandbase One (orchestration)
    cms: Contentful (marketing site) + WordPress VIP (blog/resource center, 1,200+ posts)
    web_analytics: GA4 + Amplitude (product-led signals) + Hotjar (session replay)
    seo: Ahrefs (primary), Semrush (secondary), Screaming Frog (crawl/audit), Google Search Console
    ad_platforms: Google Ads, Meta Ads, TikTok Ads Manager, LinkedIn Campaign Manager, Reddit Ads
    events: Cvent (registration + onsite), Bizzabo (mobile app + agenda), Hopin (virtual overflow)
    pr_media: Muck Rack (media database + outreach), Cision (monitoring), Meltwater (social listening)
    social: Sprout Social (scheduling + analytics), Brandwatch (listening)
    creative: Figma, Frontify (brand portal + asset DAM), Adobe Creative Cloud
    project_mgmt: Asana (marketing team of record), Airtable (editorial calendar)
    communication: Slack (primary), Gmail/Google Workspace, Zoom, Loom
    docs: Google Workspace (Docs, Slides, Sheets), Notion (wikis + launch playbooks)
    legal_workflow: DocuSign CLM (claims review, contracts, partner agreements)
    competitive_intel: Klue
  regulatory_context:
    - FTC Act Section 5 (deceptive/unfair advertising; AI efficacy claims; endorsement & testimonial guides)
    - COPPA (Children's Online Privacy Protection Act — core to K-12 audience)
    - FERPA (student records handled via Classroom product)
    - GDPR + UK GDPR (Dublin/London consumer acquisition + ABM processing)
    - CCPA/CPRA (California consumer audience)
    - ASA (UK Advertising Standards Authority) — Dublin team ships UK creative
  current_pressures:
    - Lumalynx Tutor 3.0 launch slipped from April 28 to May 12 due to an eng bug in the adaptive engine (announced March 24)
    - KnowGraph brand crisis (The Verge story March 27, 2026) — parent refund requests spiking
    - LumaSummit AV vendor (StagePro Events) filed Chapter 7 March 18, 2026 — $340K deposit at risk
    - Rebrand "Lumalynx Tutor → Lumalynx Learn" + 2,400-URL SEO migration, cutover May 5
    - Top-20 ABM program ("Project Lighthouse") targeting large US districts is in quarter 2 of 4
    - Board wants CAC payback under 14 months; currently 17 months and rising

