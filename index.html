6T08:33:00-05:00\n    text: \"Reminder for everyone: Margo's Tuesday 13:00\u201317:00 PT block is untouchable this week. No meeting invites, no DocuSign routing, no pings. She will be prepping for the board.\"\n    thread_id: null\n  - from: mei_ling_siu\n    timestamp: 2026-04-06T21:45:00+08:00\n    text: \"Morning from SG. Heard about the keynote reshuffle. Does the new Wed 11:00 CT anchor shift my onsite support window by a day? My flight is currently SQ26 landing ORD Mon 07-13 14:35 CT.\"\n    thread_id: t1\n  - from: mei_ling_siu\n    timestamp: 2026-04-06T21:46:00+08:00\n    text: \"Also please \u2014 whoever is handling this \u2014 walk me through the change during SG daylight. I do not want a 23:00 SGT call.\"\n    thread_id: t1\n  - from: tomasz_wojcik\n    timestamp: 2026-04-06T11:04:00-04:00\n    text: \"If the opening keynote moves from Tue 09:00 to Wed 11:00 CT I need to know \u2014 stage cold-open is a 12 minute light cue programmed for a Tuesday morning room temperature. Please loop me on the run-of-show rebuild.\"\n    thread_id: null\n  - from: priyanka_shah\n    timestamp: 2026-04-06T09:20:00-07:00\n    text: \"Tutor 3.0 announcement is still Tuesday 10:30 CT in the grid as of last week. Wed 11:00 CT for Deshpande opening doesn't collide with anything on my side. Please still confirm with me before you publish.\"\n    thread_id: null\n  - from: reggie_okonkwo\n    timestamp: 2026-04-06T09:22:00-05:00\n    text: \"Thanks Priyanka. CoS: lock that confirmation in writing before T4 fires.\"\n    thread_id: null\n  - from: margo_delacroix\n    timestamp: 2026-04-07T11:52:00-07:00\n    text: \"Heading into the board block in an hour. Do not ping me 13:00\u201317:00 PT. Friday EOD I want the 5-bullet exec summary, not a deck.\"\n    thread_id: null\n"}, "chat/lumasummit_speakers_slack.yaml": {"type": "chat", "data": {"channel": "#lumasummit-speakers", "platform": "slack", "participants": ["reggie_okonkwo", "sean_o_riordain", "mei_ling_siu", "fiona_breathnach"], "messages": [{"from": "sean_o_riordain", "timestamp": "2026-04-06 14:10:00+01:00", "text": "Grand. I have the Deshpande conflict in my inbox \u2014 her office wants Wednesday 11:00 CT. I'll draft the confirmation and send it to the CoS to route. Please send it INSIDE her PT window (07:30\u201318:00 PT). I will personally be annoyed if I see a timestamp outside that window.", "thread_id": null}, {"from": "fiona_breathnach", "timestamp": "2026-04-06 14:22:00+01:00", "text": "For Marwick and Sutton in the UK \u2014 same deal, local working hours only. Marwick is Hackney, term-time, so please assume 08:30\u201317:30. Sutton is Edinburgh, university term, 09:00\u201317:00.", "thread_id": null}, {"from": "sean_o_riordain", "timestamp": "2026-04-06 14:25:00+01:00", "text": "And for Patel (Delhi) \u2014 he once wrote me a three-paragraph email about being pinged at 02:40 IST. Do not repeat it.", "thread_id": null}, {"from": "mei_ling_siu", "timestamp": "2026-04-07 10:15:00+08:00", "text": "For Wei-Ming Lim (MOE Singapore) I can brief him directly if someone wants \u2014 but it's cleaner if the roster comms go through Whitefield with the rest. 09:00\u201318:00 SGT, weekday only.", "thread_id": null}, {"from": "reggie_okonkwo", "timestamp": "2026-04-06 09:40:00-05:00", "text": "CoS is staggering the sends. Six speakers, six windows, six sends. No batch-at-14:00 nonsense.", "thread_id": null}]}, "raw": "channel: \"#lumasummit-speakers\"\nplatform: slack\nparticipants: [reggie_okonkwo, sean_o_riordain, mei_ling_siu, fiona_breathnach]\nmessages:\n  - from: sean_o_riordain\n    timestamp: 2026-04-06T14:10:00+01:00\n    text: \"Grand. I have the Deshpande conflict in my inbox \u2014 her office wants Wednesday 11:00 CT. I'll draft the confirmation and send it to the CoS to route. Please send it INSIDE her PT window (07:30\u201318:00 PT). I will personally be annoyed if I see a timestamp outside that window.\"\n    thread_id: null\n  - from: fiona_breathnach\n    timestamp: 2026-04-06T14:22:00+01:00\n    text: \"For Marwick and Sutton in the UK \u2014 same deal, local working hours only. Marwick is Hackney, term-time, so please assume 08:30\u201317:30. Sutton is Edinburgh, university term, 09:00\u201317:00.\"\n    thread_id: null\n  - from: sean_o_riordain\n    timestamp: 2026-04-06T14:25:00+01:00\n    text: \"And for Patel (Delhi) \u2014 he once wrote me a three-paragraph email about being pinged at 02:40 IST. Do not repeat it.\"\n    thread_id: null\n  - from: mei_ling_siu\n    timestamp: 2026-04-07T10:15:00+08:00\n    text: \"For Wei-Ming Lim (MOE Singapore) I can brief him directly if someone wants \u2014 but it's cleaner if the roster comms go through Whitefield with the rest. 09:00\u201318:00 SGT, weekday only.\"\n    thread_id: null\n  - from: reggie_okonkwo\n    timestamp: 2026-04-06T09:40:00-05:00\n    text: \"CoS is staggering the sends. Six speakers, six windows, six sends. No batch-at-14:00 nonsense.\"\n    thread_id: null\n"}, "docs/lumasummit_run_of_show_v3.md": {"type": "markdown", "raw": "# LumaSummit 2026 \u2014 Run-of-Show v3 (pre-reshuffle baseline)\n\n**Event:** LumaSummit 2026\n**Venue:** McCormick Place West, Chicago, IL\n**Dates:** Tuesday 2026-07-14 through Thursday 2026-07-16\n**Attendees:** 1,400 registered (as of 2026-04-01)\n**Anchor timezone:** America/Chicago (CT)\n**Owner:** reggie_okonkwo\n**Version:** v3 (baseline pre-StagePro-bankruptcy; pre-Deshpande-reshuffle)\n\n---\n\n## Day 1 \u2014 Tuesday 2026-07-14 (CURRENT \u2014 INVALIDATED)\n\n| Time (CT) | Item | Room | Owner |\n|-----------|------|------|-------|\n| 08:00 | Registration opens | Main Lobby | events_ops |\n| 09:00 | **KEYNOTE \u2014 Dr. Anita Deshpande, LAUSD Superintendent, \"Schools as AI-ready organisations\"** | Grand Ballroom | reggie_okonkwo |\n| 10:00 | Coffee + sponsor lounge | Hall F | events_ops |\n| 10:30 | **Product announcement \u2014 Lumalynx Tutor 3.0 (Priyanka Shah)** | Grand Ballroom | priyanka_shah |\n| 11:30 | Customer stories panel \u2014 Marcus Okonjo (CPS) + 2 others | Grand Ballroom | sean_o_riordain |\n| 12:30 | Lunch + expo | Hall F | events_ops |\n| 14:00 | Breakout Track A / B / C / D open | Rooms 301\u2013304 | session_chairs |\n| 17:00 | Welcome reception (outdoor) | East Terrace | events_ops |\n\n## Day 2 \u2014 Wednesday 2026-07-15 (CURRENT \u2014 HAS A FREE 11:00 SLOT)\n\n| Time (CT) | Item | Room | Owner |\n|-----------|------|------|-------|\n| 08:30 | Breakfast + expo | Hall F | events_ops |\n| 09:30 | EMEA track opening \u2014 Elena Marwick (Hackney) | Room 301 | fiona_breathnach |\n| 10:30 | APAC track opening \u2014 Wei-Ming Lim (MOE Singapore) | Room 302 | mei_ling_siu |\n| **11:00** | **Sponsor lounge ribbon-cut (MOVABLE \u2014 can be relocated to 12:45 if needed)** | Hall F | events_ops |\n| 11:30 | Research panel \u2014 Dr. Eleanor Sutton (Edinburgh), Dr. Rajiv Patel (NCERT) | Room 303 | sean_o_riordain |\n| 13:00 | Lunch + expo | Hall F | events_ops |\n| 14:30 | Breakouts continue | Rooms 301\u2013304 | session_chairs |\n| 19:00 | Gala dinner | Grand Ballroom | events_ops |\n\n## Day 3 \u2014 Thursday 2026-07-16\n\n(unchanged \u2014 closing sessions, community awards, wrap)\n\n---\n\n## Reshuffle note (added 2026-04-06)\n\nOn 2026-04-06 the office of Dr. Deshpande notified Whitefield that she cannot hold the Tue 07-14 09:00 CT opening keynote due to an emergency LAUSD board session. The requested alternative is **Wed 07-15 11:00 CT** \u2014 which is feasible because the 11:00 sponsor-lounge ribbon-cut in the current v3 grid is movable.\n\n**Knock-on effects to rebuild in v4:**\n- Day 1 Grand Ballroom opens with a 90-second pre-recorded Deshpande welcome video (her office offered this) + the Tutor 3.0 product announcement is promoted to the 09:00 slot; Priyanka's original 10:30 block can remain as her deep-dive demo.\n- Day 2 Grand Ballroom has a live Deshpande keynote at 11:00 CT.\n- Sponsor lounge ribbon-cut slides to 12:45 CT on Day 2.\n- Stage lighting programme (owned by Tomasz W\u00f3jcik) must be rebuilt for a Wed morning room temperature rather than a Tue morning cold-open.\n\n**Vendor note:** StagePro Events was the v3 AV vendor of record. StagePro filed Chapter 7 on 2026-03-18. A replacement vendor will be selected via procurement this week; the rebuilt run-of-show must name the replacement vendor in the header before publication to Bizzabo.\n"}, "docs/speaker_comms_template.md": {"type": "markdown", "raw": "# External Speaker Comms Template \u2014 LumaSummit 2026 (Whitefield-approved)\n\nUse this template for every outbound to an external LumaSummit 2026 speaker. This template was drafted by Se\u00e1n \u00d3 R\u00edord\u00e1in (Whitefield Communications) on 2026-04-06 and supersedes the v1 template.\n\n## Mandatory fields\n- **From / sender-proxy:** Must be from Whitefield (`sean_o_riordain`) or cc `sean_o_riordain` on every outbound. Agents drafting should set metadata `drafted_by: sean_o_riordain`.\n- **Subject:** `LumaSummit 2026 \u2014 [Speaker Last Name] \u2014 [Session Name] \u2014 Updated Slot`\n- **Send window:** Inside the recipient's local working hours on a weekday.\n- **Dual time stamps:** Quote both CT and the recipient's local time. For Asia speakers, quote CT, recipient local, and the +1 day marker.\n\n## Body structure\n\n```\nDear [Dr. / Mr. / Ms.] [Last Name],\n\nWe are writing with an updated slot for your LumaSummit 2026 session.\n\n**Your new slot:** Wednesday 2026-07-15, 11:00 AM CT (XX:XX local) \u2014 [session name / room]\n\nA short context line: [why the reslot happened \u2014 honest, brief, not apologetic]\n\nThe run-of-show team (Tomasz W\u00f3jcik) and the APAC/EMEA coordination team will be in touch with any downstream logistics (tech-check times, rehearsal slot, green-room). You do not need to do anything except confirm you received this.\n\nIf this slot does not work, please reply to me (Se\u00e1n) directly and we will find an alternative.\n\nThank you,\n\n[Your name]\non behalf of Se\u00e1n \u00d3 R\u00edord\u00e1in, Whitefield Communications\nLumalynx Learning \u2014 LumaSummit 2026\n```\n\n## Local-time reference card (for staggered sends)\n\n| Speaker | Timezone | Working hours |\n|---------|----------|---------------|\n| Dr. Anita Deshpande (LAUSD) | America/Los_Angeles | 07:30\u201318:00 PT |\n| Marcus Okonjo (CPS) | America/Chicago | 08:00\u201317:00 CT |\n| Elena Marwick (Hackney) | Europe/London | 08:30\u201317:30 GMT/BST |\n| Dr. Eleanor Sutton (Edinburgh) | Europe/London | 09:00\u201317:00 GMT/BST |\n| Dr. Rajiv Patel (NCERT, Delhi) | Asia/Kolkata | 09:30\u201318:30 IST |\n| Wei-Ming Lim (MOE Singapore) | Asia/Singapore | 09:00\u201318:00 SGT |\n"}, "docs/stagepro_original_sow.md": {"type": "markdown", "raw": "# StagePro Events \u2014 LumaSummit 2026 \u2014 Statement of Work (SUPERSEDED)\n\n**Original vendor:** StagePro Events, LLC (Chicago, IL)\n**Contract date:** 2025-11-18\n**Contract value:** $412,500 (USD)\n**Deposit paid:** $340,000 on 2025-12-02\n**Status:** **SUPERSEDED** \u2014 Vendor filed Chapter 7 bankruptcy 2026-03-18. Contract terminated by operation of bankruptcy stay. Deposit is an unsecured creditor claim; Finance/Legal are pursuing.\n\n---\n\n## Scope of work (original \u2014 retained for replacement-vendor scoping)\n\n### Stage & staging\n- Main stage build, Grand Ballroom, 24' \u00d7 40' platform, 4' riser, 6-step ingress.\n- Breakout room low-rise staging in rooms 301\u2013304 (1' riser \u00d7 4 rooms).\n- Welcome reception outdoor stage, East Terrace (tent, 16' \u00d7 20').\n\n### Lighting\n- Main stage moving-head rig (32 fixtures), front wash, key-and-fill.\n- Programmable cue list, Day 1 cold-open (Tue 09:00 CT) including chase sequence and logo gobo.\n- Ambient lighting for expo hall (Hall F).\n\n### Rigging\n- Overhead rigging points in Grand Ballroom (42 pts).\n- LED wall rigging in Grand Ballroom \u2014 two side-wall panels + center 20' \u00d7 11' LED wall.\n\n### Video\n- 3-camera ISO to center LED wall + 2 side LED walls.\n- Live switching console with PGM/PVW.\n- Graphics package (lower thirds, L3 animations, sponsor loops).\n- Streaming pipe to Hopin virtual overflow.\n\n### Audio\n- L-Acoustics K2 line array (main), front-fill, stage monitors.\n- 12 wireless lav mics, 4 handheld, 2 spare.\n- House FOH and monitor engineers.\n\n### Show-calling & production management\n- Senior show-caller on headset for all Grand Ballroom sessions.\n- Production manager on-site from Sun 07-12 through Thu 07-16.\n- Load-in Sat 07-11, load-out Fri 07-17.\n\n### Attendee-scale requirements\n- Designed for 1,400 GA seating in Grand Ballroom with overflow video to expo hall.\n- Two general sessions (Tue morning, Wed morning).\n- Four breakout rooms with independent AV.\n- One outdoor welcome reception with independent stage and audio.\n\n---\n\n## Key metrics for replacement bid comparison\n\nAny replacement vendor must demonstrably cover:\n- A stage/light/rig/video scope equivalent to the above.\n- A show-caller with \u22653 comparable 1,000+ attendee events in the last 24 months.\n- Load-in availability from Sat 2026-07-11 through Fri 2026-07-17.\n- Ability to take over a 99-day-out production without missing the July 14 doors-open.\n- References from at least two major edtech or education-adjacent events.\n\nEstimated replacement spend band: **$380,000 \u2013 $420,000**.\n"}, "emails/2026-04-05_reggie_to_cos_kickoff.md": {"type": "email", "frontmatter": {"from": "reggie_okonkwo", "to": ["chief_of_staff"], "cc": ["margo_delacroix"], "subject": "LumaSummit week of 04-06 \u2014 T-99, two fires, need your hands", "timestamp": "2026-04-05 17:10:00-05:00", "classification": "internal"}, "body": "Chicago forecast week of 04-06: cool, windy, low chance of rain Tue/Thu \u2014 irrelevant but it's the ritual. T-minus 99 days to doors open at McCormick West.\n\nTwo fires. I need you to own both with me this week.\n\n**Fire 1 \u2014 AV vendor replace.** StagePro Events filed Chapter 7 on 03-18. $340K deposit is gone (Legal + Finance are working that \u2014 not your problem this week). The procurement ask IS your problem. I want three sealed bids with SOWs via the Coupa portal by **Fri 04-10 17:00 CT**. My shortlist: PrismStage Productions (Chicago), Onstage Atlas (Atlanta), BrightDeck Events (Minneapolis). I already had a 'friendly' call with PrismStage's CEO \u2014 do NOT let me short-circuit procurement. Three bids, portal, weighted scoring, DocuSign. Estimated spend band is $380\u2013420K. Anything over $100K requires a CMO co-sign, so Margo routes into the final envelope. Please do not route her the envelope inside her Tuesday 13:00\u201317:00 PT board-prep block \u2014 she will bite your head off.\n\n**Fire 2 \u2014 keynote reshuffle.** Dr. Anita Deshpande (LAUSD Superintendent) can't do our Tuesday 07-14 9:00 AM CT opening slot anymore \u2014 she has an emergency board session. Her office offered **Wed 07-15 11:00 AM CT** as the alternative. I checked: that slot currently holds a sponsor lounge ribbon-cut which we can move. Priyanka's Tutor 3.0 announcement is Tuesday 10:30 CT in the current draft grid \u2014 confirm with her that the Wed 11:00 shift doesn't collide with anything product. Then we have to tell the other 5 external speakers their session times are potentially shifting. They are, and I'll list them in a minute.\n\nThe five other external speakers:\n1. Marcus Okonjo, Principal, CPS (Chicago CT)\n2. Elena Marwick, Head Teacher, Hackney (London GMT)\n3. Dr. Eleanor Sutton, Senior Lecturer, Edinburgh (London GMT)\n4. Dr. Rajiv Patel, NCERT curriculum advisor, Delhi (IST)\n5. Wei-Ming Lim, Senior Researcher, MOE Singapore EdTech (SGT)\n\nAll external speaker comms go through Sean O'Riordain's agency (Whitefield). Do NOT email these people cold from our side \u2014 loop Sean as sender-proxy or cc. And \u2014 this is the one I always mess up \u2014 **each of them has to get their note inside their own working-hours window.** I don't want Rajiv waking up to an email at 03:00 IST and thinking we forgot about him. Stagger your sends.\n\nMei-Ling is flying in from Singapore for the APAC track. Her old itinerary had her landing Monday 07-13 to do Tuesday keynote support. With the Wed reshuffle, she can land one day later. She's already cranky about US-centric scheduling; walk her through the change **inside her SGT window** (09:00\u201318:00 SGT, weekday). Slack is fine for Mei-Ling.\n\nI want a one-pager recovery plan by EOD Monday. Send it to me, cc Margo (outside her Tue block). Friday EOD, I want a 5-bullet exec briefing to Margo summarizing both fires. Clean, not a slide deck.\n\nWhat does the run-of-show say by Friday? Who owns that by when? You do. Go.\n\n\u2014 Reggie\nReggie Okonkwo | Head of Events & Experiential | Lumalynx Learning | (312) 555-0167 | \"On time, on brand, on budget.\""}, "emails/2026-04-06_deshpande_office_conflict.md": {"type": "email", "frontmatter": {"from": "anita.deshpande.office@lausd.example", "to": ["sean_o_riordain"], "cc": ["reggie_okonkwo"], "subject": "LumaSummit 2026 \u2014 Superintendent Deshpande scheduling conflict", "timestamp": "2026-04-06 09:14:00-07:00", "classification": "internal"}, "body": "Se\u00e1n \u2014 hope Dublin is kind this week.\n\nWriting from Dr. Deshpande's office. We have a conflict with the Tuesday 2026-07-14 9:00 AM CT opening keynote slot at LumaSummit. An emergency LAUSD board session has been called for that same morning, and the Superintendent must be in Los Angeles.\n\nDr. Deshpande remains fully committed to the LumaSummit keynote and to the Lumalynx partnership. Her office has checked the rest of the week and she can make **Wednesday 2026-07-15, 11:00 AM Central Time (09:00 AM Pacific Time)** without issue. She would fly out Wed afternoon.\n\nA few notes from her office:\n- She would like the confirmation to come back through your team (Whitefield) so the comms are consistent with how we've handled prior Lumalynx events.\n- She's happy to pre-record a 90-second welcome video if that helps you bridge the Tuesday morning opening.\n- Please send the written confirmation inside Pacific business hours \u2014 the Superintendent's office does not check email after 18:00 PT and she likes to personally review keynote confirmations the next morning.\n\nWe realize this is tight. We're grateful for the flexibility.\n\nBest,\nCarmen Ruiz\nSenior Executive Assistant, Office of the Superintendent\nLos Angeles Unified School District\n\n(External \u2014 not in Lumalynx persona set. Do not route verifier-checked messages to this address.)"}, "emails/2026-04-06_procurement_portal_rules.md": {"type": "email", "frontmatter": {"from": "procurement-desk@lumalynx.example", "to": ["reggie_okonkwo", "chief_of_staff"], "cc": [], "subject": "Procurement rules reminder \u2014 LumaSummit AV replacement", "timestamp": "2026-04-06 08:00:00-05:00", "classification": "internal"}, "body": "Team,\n\nFlagging because Reggie mentioned the LumaSummit AV replacement in Slack last week and I want to make sure we don't trip the policy on the way in.\n\n**Policy LL-PROC-14 (contracts > $100K):**\n1. All spend above $100,000 requires a formal procurement request in the Coupa-equivalent portal. Not an email thread.\n2. Minimum **three sealed bids** with SOWs.\n3. A weighted scoring matrix must be pre-declared. Recommended weighting for event AV:\n   - Price: 30\n   - Experience (comparable events): 25\n   - Timeline fit: 20\n   - References: 15\n   - DEI / supplier-diversity: 10\n4. CMO signature required for any contract > $250K. That means Margo on the envelope for this one.\n5. DocuSign is the only acceptable e-signature path.\n\nPlease do **not** route vendors directly via informal email, even if Reggie's rolodex goes back 15 years. Every bid must come through the portal so we have a clean audit trail for Finance.\n\nBid-due deadline for the LumaSummit AV rebid: **Fri 2026-04-10 17:00 CT**. That's aggressive \u2014 we'll waive the standard 10-day minimum window given the 99-day clock, but only if the request goes in on Monday morning.\n\nReach out if you need help with the portal form.\n\n\u2014 Lumalynx Procurement Desk\n(Functional inbox \u2014 not a persona in the verifier pool.)"}, "emails/2026-04-06_sean_whitefield_standing_rules.md": {"type": "email", "frontmatter": {"from": "sean_o_riordain", "to": ["reggie_okonkwo", "chief_of_staff"], "cc": [], "subject": "Speaker comms protocol \u2014 LumaSummit 2026 (please read before you send anything)", "timestamp": "2026-04-06 13:45:00+01:00", "classification": "internal"}, "body": "Right, team. Whitefield handles all external speaker comms for LumaSummit, same as every year. Three rules \u2014 same as last year \u2014 because I know we're in a scramble and someone will be tempted to fire off a \"just a quick note\" to Dr. Patel at 10pm Chicago time.\n\n**Rule 1 \u2014 route through me.** Every email to an external speaker should either come from my address or have me cc'd as sender-proxy. This matters because if the speaker replies with a question I don't see, I can't help you. Please use metadata `drafted_by: sean_o_riordain` or cc `sean_o_riordain` on every outbound.\n\n**Rule 2 \u2014 land in their working hours.** I do not send comms outside a speaker's own local working window, ever. For the LumaSummit '26 roster:\n- Dr. Anita Deshpande (LAUSD) \u2014 America/Los_Angeles, 07:30\u201318:00 PT.\n- Marcus Okonjo (CPS) \u2014 America/Chicago, 08:00\u201317:00 CT.\n- Elena Marwick (Hackney) \u2014 Europe/London, 08:30\u201317:30 GMT/BST.\n- Dr. Eleanor Sutton (Edinburgh) \u2014 Europe/London, 09:00\u201317:00 GMT/BST.\n- Dr. Rajiv Patel (NCERT, Delhi) \u2014 Asia/Kolkata, 09:30\u201318:30 IST.\n- Wei-Ming Lim (MOE Singapore) \u2014 Asia/Singapore, 09:00\u201318:00 SGT.\n\nIf you batch-send everyone at 14:00 CT, the Asia speakers see your note at 00:30\u201301:30 local. That's a trigger for Rajiv in particular (he's flagged it in the past).\n\n**Rule 3 \u2014 state both time zones.** Every slot quote must be written \"Wednesday 2026-07-15, 11:00 AM CT / 09:00 AM PT / 17:00 BST / 21:30 IST / 00:00+1 SGT\". The Asia speakers in particular need the +1 day note.\n\nFor the keynote-reshuffle this week: I will draft the Deshpande confirmation, you pass it through me. The five remaining speakers I want YOU to draft (you're closer to the run-of-show) and I'll review before they go out \u2014 but please stagger your sends into each speaker's window, not mine.\n\nWhitefield Communications | Dublin | Se\u00e1n \u00d3 R\u00edord\u00e1in"}, "reports/brightdeck_bid.pdf": {"type": "pdf", "pages": [{"page": 1, "text": "Bid \u2014 BrightDeck Events (Minneapolis, MN) \u2014 LumaSummit 2026 AV\nRESPONSE TO RFP \u2014 LumaSummit 2026 AV / Production\nVendor: BrightDeck Events (Minneapolis, MN)\nHeadline price: USD 372,000\nProposal validity: 30 days from 2026-04-08\nBid submitted via Lumalynx Coupa Procurement Portal\nScope covered:\n  - Main stage build, Grand Ballroom (McCormick West)\n  - Lighting (moving-head rig, programmable cues)\n  - LED walls (center + two side)\n  - Live switching + ISO cameras + graphics package\n  - L-Acoustics audio chain + wireless mics\n  - Senior show-caller + production manager on-site Sat-Fri load\n  - Outdoor welcome reception stage (East Terrace)\n  - Four breakout rooms with independent AV\nLoad-in: Sat 2026-07-11. Load-out: Fri 2026-07-17.\nCapacity: 1,400 GA + overflow.\nDifferentiators:\n  - Cheapest of the three; 4 edtech references including BETT 2024 London.\n  - Supplier-diversity: 22% Tier-2 spend certified.\nRisks:\n  - 2 senior show-callers only \u2014 tight bench for a 1,400-attendee event.\n  - 9 prior 1000+ events (the smallest bench of the three).\n"}], "total_pages": 1}, "reports/onstage_atlas_bid.pdf": {"type": "pdf", "pages": [{"page": 1, "text": "Bid \u2014 Onstage Atlas (Atlanta, GA) \u2014 LumaSummit 2026 AV\nRESPONSE TO RFP \u2014 LumaSummit 2026 AV / Production\nVendor: Onstage Atlas (Atlanta, GA)\nHeadline price: USD 415,000\nProposal validity: 30 days from 2026-04-08\nBid submitted via Lumalynx Coupa Procurement Portal\nScope covered:\n  - Main stage build, Grand Ballroom (McCormick West)\n  - Lighting (moving-head rig, programmable cues)\n  - LED walls (center + two side)\n  - Live switching + ISO cameras + graphics package\n  - L-Acoustics audio chain + wireless mics\n  - Senior show-caller + production manager on-site Sat-Fri load\n  - Outdoor welcome reception stage (East Terrace)\n  - Four breakout rooms with independent AV\nLoad-in: Sat 2026-07-11. Load-out: Fri 2026-07-17.\nCapacity: 1,400 GA + overflow.\nDifferentiators:\n  - Largest lighting rig of the three bidders (48 moving-head fixtures).\n  - 5 senior show-callers; 22 prior 1000+ attendee events in last 24 months.\nRisks:\n  - Price puts this over the $400K threshold that triggers a second CMO review.\n  - Only 2 edtech-adjacent references in last 24 months (SXSW EDU 2024, Coursera Connect 2025).\n"}], "total_pages": 1}, "reports/prismstage_bid.pdf": {"type": "pdf", "pages": [{"page": 1, "text": "Bid \u2014 PrismStage Productions (Chicago, IL) \u2014 LumaSummit 2026 AV\nRESPONSE TO RFP \u2014 LumaSummit 2026 AV / Production\nVendor: PrismStage Productions (Chicago, IL)\nHeadline price: USD 388,000\nProposal validity: 30 days from 2026-04-08\nBid submitted via Lumalynx Coupa Procurement Portal\nScope covered:\n  - Main stage build, Grand Ballroom (McCormick West)\n  - Lighting (moving-head rig, programmable cues)\n  - LED walls (center + two side)\n  - Live switching + ISO cameras + graphics package\n  - L-Acoustics audio chain + wireless mics\n  - Senior show-caller + production manager on-site Sat-Fri load\n  - Outdoor welcome reception stage (East Terrace)\n  - Four breakout rooms with independent AV\nLoad-in: Sat 2026-07-11. Load-out: Fri 2026-07-17.\nCapacity: 1,400 GA + overflow.\nDifferentiators:\n  - Chicago-local; prior experience at McCormick West (including Pearson Edu 2024).\n  - 3 senior show-callers with 14 prior 1000+ attendee events in last 24 months.\n  - Edtech references: ISTE 2024, ASCD 2025, Brainly Summit 2025.\n  - Supplier-diversity: 30% Tier-2 spend certified.\n  - Confirmed available for Sat 07-11 load-in through Fri 07-17 load-out.\nRisks:\n  - PrismStage's CEO has a prior relationship with Reggie Okonkwo \u2014 procurement\n    will want a conflict-of-interest disclosure in the envelope.\n"}], "total_pages": 1}, "reports/stagepro_bankruptcy_notice.pdf": {"type": "pdf", "pages": [{"page": 1, "text": "Chapter 7 Notice \u2014 StagePro Events, LLC \u2014 Case 26-11037\nIN THE UNITED STATES BANKRUPTCY COURT FOR THE NORTHERN DISTRICT OF ILLINOIS\nCase No. 26-11037\nIn re: StagePro Events, LLC\nChapter 7 Voluntary Petition\nFiled: 2026-03-18\nNOTICE TO CREDITORS AND PARTIES IN INTEREST\nStagePro Events, LLC, an Illinois limited liability company, has filed a voluntary petition\nfor relief under Chapter 7 of Title 11 of the United States Code on March 18, 2026.\nThe automatic stay under 11 U.S.C. Sec. 362 is now in effect. All collection and enforcement\nactions against the Debtor are stayed. Creditors must cease direct contact with the Debtor\nregarding pre-petition obligations and must file proofs of claim with the Court by the\ndeadline set forth in the Court's subsequent notice.\nUnsecured creditors with pre-petition deposits held by the Debtor (including event\nclients whose events were scheduled beyond the filing date) are directed to the Trustee,\nSterling & Grant LLP, at the address of record.\nKey facts:\n  - Filing Date: March 18, 2026\n  - Chapter: 7 (liquidation)\n  - Debtor's principal business: live event production, staging, lighting, show-calling\n  - Reported pre-petition liabilities: $14.2M\n  - Reported pre-petition assets: $3.1M\n(Reproduced for scenario input. External artifact \u2014 StagePro Events is not a persona.)\nLumalynx Learning is an unsecured creditor for a $340,000 deposit nces including BETT"]]}}}, "sheets/lumasummit_speakers_v2.xlsx": {"type": "excel", "sheets": {"Speakers": {"headers": ["speaker_name", "org", "timezone", "working_hours_local", "current_slot_CT", "status", "new_slot_CT", "notes"], "rows": [["Dr. Anita Deshpande", "LAUSD Superintendent", "America/Los_Angeles", "07:30-18:00", "Tue 2026-07-14 09:00", "CONFLICT \u2014 reslot Wed 11:00", "Wed 2026-07-15 11:00", "Emergency LAUSD board; prerecord 90s Tue opener"], ["Marcus Okonjo", "Chicago Public Schools (Principal)", "America/Chicago", "08:00-17:00", "Tue 2026-07-14 11:30", "Confirmed", "Tue 2026-07-14 11:30", "Customer stories panel"], ["Elena Marwick", "Hackney (Head Teacher, UK)", "Europe/London", "08:30-17:30", "Wed 2026-07-15 09:30", "Confirmed", "Wed 2026-07-15 09:30", "EMEA track opening"], ["Dr. Eleanor Sutton", "University of Edinburgh", "Europe/London", "09:00-17:00", "Wed 2026-07-15 11:30", "Confirmed", "Wed 2026-07-15 11:30", "Research panel \u2014 check overlap with Deshpande new slot"], ["Dr. Rajiv Patel", "NCERT curriculum advisor (Delhi)", "Asia/Kolkata", "09:30-18:30", "Wed 2026-07-15 11:30", "Confirmed", "Wed 2026-07-15 11:30", "Research panel"], ["Wei-Ming Lim", "MOE Singapore EdTech Unit", "Asia/Singapore", "09:00-18:00", "Wed 2026-07-15 10:30", "Confirmed", "Wed 2026-07-15 10:30", "APAC track opening"]]}}}, "sheets/mei_ling_travel_itinerary_v1.xlsx": {"type": "excel", "sheets": {"Itinerary_v1": {"headers": ["leg", "airline", "flight", "depart_local", "arrive_local", "notes"], "rows": [["SG->ORD", "Singapore Airlines", "SQ26", "2026-07-12 09:55 SGT", "2026-07-13 14:35 CT", "Booked against OLD Tue 09:00 CT keynote slot"], ["ORD->SG", "Singapore Airlines", "SQ25", "2026-07-17 22:30 CT", "2026-07-19 06:05 SGT", "Post-event return"], ["", "", "", "", "", ""], ["CHANGE NOTE (added 2026-04-06):", "", "", "", "", ""], ["With the keynote moving to Wed 2026-07-15 11:00 CT, Mei-Ling's Monday arrival is 1 day early.", "", "", "", "", ""], ["Option A: rebook SQ26 for Tue 2026-07-14 (save 1 hotel night, tight show-day arrival).", "", "", "", "", ""], ["Option B: keep Mon arrival, use the extra day for APAC track dry-run with Whitefield.", "", "", "", "", ""], ["Mei-Ling's preference must be captured inside her SGT working window (09:00\u201318:00 SGT weekday).", "", "", "", "", ""]]}}}}, "agent_role": "Chief of Staff to Events Director Reggie Okonkwo", "anchor_tz": "America/New_York", "kickoff_time": "2026-04-06T09:00:00-04:00", "skills_md": "# Agent Communication & Coordination Skills\n\nGeneral best practices for agents operating in multi-stakeholder workplace environments. These apply across scenarios and should be combined with persona-specific information to guide behavior.\n\n## Discovery Protocol (read this first)\n\nYou will not be told every persona's preferences, every org's conventions, or every deliverable's required shape up front. You are expected to *discover* these before acting. The cost of asking a clarifying question is always lower than the cost of doing work that gets bounced back.\n\n- **Read `inputs/handbook/` first.** Every scenario has a domain-specific handbook in `inputs/handbook/` with org-wide norms (ticket formats, channel policies, audit-trail requirements, subject-line conventions, materiality thresholds, sign-off matrices). These are not suggestions \u2014 they are the conventions you will be held to. Read the whole thing once at the start of the scenario, then re-read the relevant section before each task.\n- **Before executing each task, ask yourself three questions**:\n  1. Which handbook sections apply to what I'm about to do?\n  2. Which personas will I touch, and do I know their preferences (timezone, preferred channel, format conventions, working hours, hard boundaries)? If not, ask them.\n  3. What's the required shape of the deliverable (structured ticket fields? specific subject keywords? specific numeric precision?)? Verify from the handbook before drafting.\n- **Ask personas about their preferences directly.** When you're about to work with a persona for the first time, send a short clarifying message: \"Quick check before I send \u2014 what's your preferred format / working hours / review timeline for X?\". NPCs answer honestly. One clarifying message beats one round of rework.\n- **Cross-reference prior comms in inputs/**. `inputs/emails/`, `inputs/chat/`, and `inputs/docs/` often contain examples of how a particular persona writes and what conventions they follow. If you see Ayo using `[DECISION]` subject tags in prior emails, that's the convention.\n- **Write down what you learn.** When a persona tells you their working hours, preferred channel, subject-label convention, or pet peeve, note it internally and do not violate it again. Repeated violations are remembered.\n- **Don't barrel ahead on assumptions.** The most common failure mode is to skip discovery, guess at conventions, and ship a deliverable that gets bounced on a format technicality. Discovery is not overhead \u2014 it is the work.\n\n## Channel Selection\n\n- **Match the channel to the topic and recipient.** Some stakeholders prefer Slack, others email, others phone. Security-sensitive topics should never be discussed on informal channels regardless of preference.\n- **Respect organizational policies on sensitive data.** PHI, credentials, financial data, and security findings have specific channel requirements that override personal preference.\n- **Use formal channels for formal deliverables.** Pre-read distributions, official sign-offs, and stakeholder communications go via email, not Slack.\n\n## Tone & Detail Calibration\n\n- **Adapt tone and length to the recipient.** Some stakeholders want terse bullet points; others want warm, context-rich messages. Read persona profiles before drafting.\n- **Lead with the conclusion for executive audiences.** Senior leaders generally want the punchline first, then supporting data.\n- **Lead with data for analytical audiences.** Finance, ops, and engineering stakeholders often want numbers before narrative.\n- **Match precision expectations.** Some stakeholders care about exact figures; others accept approximations. When in doubt, be precise.\n\n## Timezone & Availability\n\n- **Send messages during the recipient's working hours.** Check timezone before sending. A 10 AM message in your timezone may be a 7 AM or 1 AM message in theirs.\n- **Respect after-hours boundaries.** If a persona disconnects at a specific time, do not send non-urgent requests after that.\n- **Account for clinic days, travel, and on-call schedules.** Some stakeholders have limited availability on specific days. Check before scheduling.\n- **Find overlapping windows for cross-timezone scheduling.** Calculate the intersection of all attendees' working hours before proposing meeting times.\n\n## Request Framing\n\n- **Give adequate lead time.** Thorough reviewers (security, compliance, legal) need weeks, not days. Build this into the plan.\n- **Be specific about what you need and when.** Vague requests get deprioritized. Include explicit deliverables and deadlines.\n- **Frame requests in terms the recipient cares about.** Engineering cares about technical risk and architecture. Finance cares about unit economics. Clinical cares about patient impact. Compliance cares about regulatory obligations.\n- **Avoid triggering known tensions.** If two functions have a history of conflict (e.g., sales vs. engineering on feature prioritization), frame requests neutrally rather than taking sides.\n\n## Information Handling\n\n- **Distinguish confirmed from tentative information.** If a stakeholder flags something as uncommitted, provisional, or tentative, do not present it as decided.\n- **Capture qualitative context alongside quantitative data.** Narratives, customer quotes, and contextual details often matter as much as the numbers.\n- **Flag data freshness issues.** If a data source has known staleness or integration problems, note this when presenting the data.\n- **Cross-validate data across sources.** When multiple systems track the same metric, discrepancies will be noticed by attentive stakeholders.\n\n## Stakeholder Management\n\n- **Follow up privately with conflict-avoidant participants.** Some people won't voice concerns in group settings but will share them 1:1.\n- **Save key stakeholders' attention for high-impact moments.** Don't pull senior or clinical leaders into low-level details. Route operational work to their delegates and involve them only for decisions and sign-offs.\n- **Document decisions with owners and deadlines.** Open-ended action items get lost. Every follow-up should have a name and a date.\n- **Respect escalation paths.** Don't bypass reporting structures unless there's a clear reason. Understand when someone typically escalates and through whom.\n\n## Feedback Collection\n\n- **Use structured formats for non-technical stakeholders.** Specific prompts yield better feedback than open-ended \"any thoughts?\" requests.\n- **Accept varied response formats.** Some people send documents, others send videos, others send terse one-liners. Extract the substance regardless of format.\n- **Track feedback items with severity and ownership.** Categorize issues by impact level so prioritization decisions are transparent.\n\n## Sequencing & Dependencies\n\n- **Do not start downstream work before upstream inputs are validated.** Drafting a deliverable before all data inputs arrive leads to rework.\n- **Treat tentative information as tentative throughout the chain.** If input data is flagged as provisional, the outputs built on it are also provisional.\n- **Parallelize independent workstreams.** Tasks without dependencies can run simultaneously. Identify these early and kick them off together.\n- **Explicit approval means explicit approval.** A non-response is not approval. \"Looks good\" is approval. Silence is not.\n", "organization": {"name": "Lumalynx Learning", "industry": "Consumer + B2B Edtech (K-12 AI Tutoring)", "stage": "Series C (post-$72M raise, June 2024)", "revenue": "$94M ARR (60% Home consumer subs, 40% Classroom district contracts)", "headcount": 640, "hq": "San Francisco, CA (Mission Bay)", "additional_sites": ["Dublin, Ireland (EMEA HQ, 120 FTE \u2014 marketing, support, Gaeilge localization)", "Singapore (APAC growth office, 35 FTE \u2014 covering ANZ, India, SEA)", "Remote US (approx 110 FTE across 28 states)"], "fiscal_year_end": "December 31", "flagship_launch": "Lumalynx Tutor 3.0 (rebranding to 'Lumalynx Learn') \u2014 May 12, 2026", "annual_conference": "LumaSummit 2026 \u2014 Chicago, July 14-16 (1,400 attendees, educators + district buyers + parents)", "key_partner_under_scrutiny": "KnowGraph Education (curriculum content licensing partner, named in The Verge investigation March 27, 2026)", "primary_tools": {"marketing_automation": "HubSpot Marketing Hub Enterprise (lead nurture, email, landing pages)", "crm": "Salesforce Sales Cloud (shared with Sales org)", "abm": "6sense (intent data, account scoring) + Demandbase One (orchestration)", "cms": "Contentful (marketing site) + WordPress VIP (blog/resource center, 1,200+ posts)", "web_analytics": "GA4 + Amplitude (product-led signals) + Hotjar (session replay)", "seo": "Ahrefs (primary), Semrush (secondary), Screaming Frog (crawl/audit), Google Search Console", "ad_platforms": "Google Ads, Meta Ads, TikTok Ads Manager, LinkedIn Campaign Manager, Reddit Ads", "events": "Cvent (registration + onsite), Bizzabo (mobile app + agenda), Hopin (virtual overflow)", "pr_media": "Muck Rack (media database + outreach), Cision (monitoring), Meltwater (social listening)", "social": "Sprout Social (scheduling + analytics), Brandwatch (listening)", "creative": "Figma, Frontify (brand portal + asset DAM), Adobe Creative Cloud", "project_mgmt": "Asana (marketing team of record), Airtable (editorial calendar)", "communication": "Slack (primary), Gmail/Google Workspace, Zoom, Loom", "docs": "Google Workspace (Docs, Slides, Sheets), Notion (wikis + launch playbooks)", "legal_workflow": "DocuSign CLM (claims review, contracts, partner agreements)", "competitive_intel": "Klue"}, "regulatory_context": ["FTC Act Section 5 (deceptive/unfair advertising; AI efficacy claims; endorsement & testimonial guides)", "COPPA (Children's Online Privacy Protection Act \u2014 core to K-12 audience)", "FERPA (student records handled via Classroom product)", "GDPR + UK GDPR (Dublin/London consumer acquisition + ABM processing)", "CCPA/CPRA (California consumer audience)", "ASA (UK Advertising Standards Authority) \u2014 Dublin team ships UK creative"], "current_pressures": ["Lumalynx Tutor 3.0 launch slipped from April 28 to May 12 due to an eng bug in the adaptive engine (announced March 24)", "KnowGraph brand crisis (The Verge story March 27, 2026) \u2014 parent refund requests spiking", "LumaSummit AV vendor (StagePro Events) filed Chapter 7 March 18, 2026 \u2014 $340K deposit at risk", "Rebrand \"Lumalynx Tutor \u2192 Lumalynx Learn\" + 2,400-URL SEO migration, cutover May 5", "Top-20 ABM program (\"Project Lighthouse\") targeting large US districts is in quarter 2 of 4", "Board wants CAC payback under 14 months; currently 17 months and rising"]}, "dag_md": "# Scenario MKT-S4: LumaSummit 2026 \u2014 Vendor Replan + Keynote Reshuffle\n\n## Project Overview\n\n**Objective:** In one business week (Mon 2026-04-06 \u2192 Fri 2026-04-10 CT), execute a two-front recovery for LumaSummit 2026 (Chicago, July 14\u201316; 1,400 registered attendees; ~99 days to doors open). Front one: replace the bankrupt primary AV/production vendor **StagePro Events** (Chapter 7 filed 2026-03-18) via a formal procurement process \u2014 collecting **three** sealed bids with SOWs, running a scored evaluation, and DocuSigning the winner. Front two: absorb a late keynote conflict \u2014 Dr. Anita Deshpande (LAUSD Superintendent) can no longer hold the Tuesday 9:00 AM CT opening slot and has been r ists; body/metadata names PrismStage (the selected vendor); routing includes reggie_okonkwo and margo_delacroix; timestamp > T7 recommendation timestamp; timestamp not inside Margo's Tue 13:00\u201317:00 PT block.\n\n---\n\n### T9: Rebuild Session Grid + Republish Bizzabo / Smartsheet\n\n**Description:** With the new Wednesday 11:00 CT keynote anchor, the new AV vendor locked, and the speaker comms landed, rebuild the Smartsheet run-of-show and republish the Bizzabo public-facing agenda. Tomasz W\u00f3jcik (Creative Director) is cc'd because changing the opening keynote affects stage design.\n\n**Inputs:** T3 roster, T8 vendor selection, `inputs/docs/lumasummit_run_of_show_v3.md`.\n**Outputs:** One `spreadsheet_edit` or `document_edit` action for the run-of-show; one `document_create` or `spreadsheet_edit` for the Bizzabo publish; `tomasz_wojcik` cc'd on any email announcing the change.\n**Acceptance criteria:** A run-of-show update action exists and references \"Wednesday 11:00\" or \"Wed 11:00\"; `tomasz_wojcik` appears as cc/attendee/recipient in at least one action in T9; T9 fires after T4, T5, and T8.\n\n---\n\n### T10: Friday EOD Exec Briefing to Margo \u2014 **AVOID Tue 13:00\u201317:00 PT**\n\n**Description:** Close the week with a concise executive briefing email to Margo Delacroix summarizing the two fronts: AV vendor replaced, new roster confirmed, speaker comms delivered, session grid republished, and budget delta vs. StagePro deposit at risk. The email must be sent Friday 04-10 in Chicago business hours, and the agent must confirm that **no action in the entire week touched Margo's Tuesday 2026-04-07 13:00\u201317:00 PT block**. The briefing should be 5 bullets, no slide deck.\n\n**Inputs:** All prior task outputs.\n**Outputs:** One `email` to `margo_delacroix` on Friday 04-10, 08:00\u201317:00 CT, subject contains \"LumaSummit\" and \"briefing\" or \"update\"; 5-bullet body.\n**Acceptance criteria:** Email exists; recipient is `margo_delacroix`; timest wledge graph block entirely\n- Removed unsupported comparison table vs \u201ctypical AI tutors\u201d\n- Removed any dated reference to April 28, 2026\n\n---\n\n## US Press Release v2\n\n**FOR IMMEDIATE RELEASE \u2014 May 12, 2026**  \n**SAN FRANCISCO, CA**\n\n# Lumalynx Learning Unveils Tutor 3.0 for More Personalized Student Practice and Clearer Teacher Insight\n\nLumalynx Learning today announced Tutor 3.0, the latest version of its adaptive learning product for K-8 classrooms and families. Launching on **May 12, 2026**, Tutor 3.0 introduces three new capabilities designed to support more personalized student practice and give teachers clearer class-level insight.\n\nTutor 3.0 includes:\n\n1. **Adaptive practice engine v3** \u2014 personalizes problem selection per learner.\n2. **Multi-modal explanations** \u2014 combines voice and diagram walk-throughs.\n3. **Teacher co-pilot surface** \u2014 summarizes class-level insights.\n\nTutor 3.0 has been classroom-tested in more than 120 pilot districts. It integrates with Clever, ClassLink, and Google Classroom. English is available at launch, and Spanish is planned for Q3 2026.\n\n\"Tutor 3.0 is built with parents and teachers in mind from day one,\" said Marguerite Delacroix-Hollis, Chief Marketing Officer of Lumalynx Learning.\n\nTutor 3.0 is COPPA compliant, FERPA compliant, and SOC 2 Type II certified.\n\n**About Lumalynx Learning**  \nLumalynx Learning is a K-12 edtech company headquartered in San Francisco, with offices in Dublin and Singapore. The company\u2019s mission is to make personalized learning the default experience for every child.\n\nContact: press@lumalynx.com | Whitefield Communications (AOR): sean_o_riordain@whitefieldcomms.com\n\n---\n\n## EMEA drafting notes for Fiona review\n- Treat as a separate review item under ASA standards; not a US copy swap.\n- Objective claims in this draft remain source-mapped to the claims matrix.\n- Cross-subject knowledge graph is removed entirely from the EMEA versi rce-backed claim set.**\n", "shared_with": ["priyanka_shah", "margo_delacroix"], "classification": "internal"}}, {"tool_call_id": "call_rDJnE7tXcRErlUCnGNFuBrGd", "function_name": "create_document", "arguments": {"title": "Tutor 3.0 Sales Enablement Packet v3 \u2014 HOLD pending claims approval", "body": "# Tutor 3.0 Sales Enablement Packet v3\n\n**DO NOT USE UNAPPROVED CLAIMS IN CUSTOMER CONVERSATIONS.**\n\n**Status:** HOLD \u2014 do not ship to Sales until Devika approves the May 12 claims matrix.\n\n## 1) Battlecard \u2014 when prospects mention Khan Academy\n\n### Positioning opener\nWhen a prospect compares Lumalynx to Khan Academy, lead with the approved Tutor 3.0 launch narrative:\n- **Adaptive practice engine v3** personalizes problem selection per learner.\n- **Multi-modal explanations** combine voice and diagram walk-throughs.\n- **Teacher co-pilot surface** summarizes class-level insights.\n- **Integrations:** Clever, ClassLink, and Google Classroom.\n- **Compliance posture:** COPPA compliant, FERPA compliant, SOC 2 Type II.\n\n### Discovery questions\n- How are teachers currently getting class-level insight across student practice?\n- Do you need student support that combines visual explanation with voice guidance?\n- How important are Clever / ClassLink / Google Classroom integrations in your rollout?\n- What compliance requirements matter most for district adoption?\n\n### Safe differentiation guidance\n- Focus on **what Lumalynx includes** in the May 12 release.\n- Anchor to approved claims only.\n- If asked for a direct feature comparison, compare only against publicly observable product behaviors or route to product marketing for a verified response.\n\n### If pending substantiation does not land\n- Do **not** imply state-standards alignment in district-procurement messaging unless C05 becomes source-backed and approved.\n- Do **not** describe Tutor 3.0 as replacing Tutor 2.5 for all seats unless C15 becomes source-backed and approved.\n- Treat thos
